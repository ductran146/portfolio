<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Duc Tran Portfolio</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="design-tokens.css">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:var(--font-sans);font-size:var(--font-size-base);line-height:var(--line-height-normal);min-height:100vh;}
  a{color:inherit;}
  ::selection{background:var(--primary);color:var(--on-primary);}

  .wrap{max-width:960px;margin:0 auto;padding:48px 24px 120px;}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:40px;}
  .brand{font-size:20px;font-weight:var(--font-weight-semibold);}
  .brand span{color:var(--primary);}
  .who{display:flex;align-items:center;gap:12px;}
  .who img{width:32px;height:32px;border-radius:50%;}
  .who-name{font-size:13.5px;color:var(--text-dim);}
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    height:var(--control-h-md);padding:var(--control-pad-md);border-radius:var(--radius-md);
    border:1px solid var(--border-strong);background:var(--surface);color:var(--text);
    font-family:inherit;font-size:14px;font-weight:var(--font-weight-medium);cursor:pointer;
    transition:border-color .2s ease, transform .2s ease, background .2s ease;
  }
  .btn:hover{border-color:var(--primary);transform:translateY(-1px);}
  .btn-primary{background:var(--primary);border-color:var(--primary);color:var(--on-primary);}
  .btn-primary:hover{background:var(--primary-strong);border-color:var(--primary-strong);}
  .btn-danger{color:var(--danger);}
  .btn-danger:hover{border-color:var(--danger);}
  .btn-sm{height:var(--control-h-sm);padding:var(--control-pad-sm);font-size:13px;}
  .btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}

  /* ---- gate screens ---- */
  .gate{min-height:80vh;display:flex;align-items:center;justify-content:center;text-align:center;flex-direction:column;gap:20px;}
  .gate h1{font-size:26px;font-weight:var(--font-weight-semibold);}
  .gate p{color:var(--text-dim);max-width:420px;}
  .gate .mono{font-family:var(--font-mono);font-size:13px;color:var(--text-faint);}

  /* ---- project list ---- */
  .list-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
  .list-head h2{font-size:20px;font-weight:var(--font-weight-semibold);}
  .empty-hint{
    border:1px dashed var(--border-strong);border-radius:var(--radius-lg);padding:40px 24px;
    text-align:center;color:var(--text-dim);margin-bottom:20px;
  }
  .proj-card{
    display:flex;gap:16px;align-items:flex-start;background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius-lg);padding:16px;margin-bottom:12px;
  }
  .proj-thumb{width:96px;height:72px;border-radius:var(--radius-sm);object-fit:cover;flex-shrink:0;background:var(--surface-2);}
  .proj-thumb-empty{width:96px;height:72px;border-radius:var(--radius-sm);background:var(--surface-2);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--text-faint);font-size:11px;text-align:center;}
  .proj-info{flex-grow:1;min-width:0;}
  .proj-title{font-weight:var(--font-weight-semibold);font-size:15px;margin-bottom:2px;}
  .proj-sub{color:var(--text-dim);font-size:12.5px;margin-bottom:6px;}
  .proj-tags{display:flex;gap:6px;flex-wrap:wrap;}
  .proj-tags span{font-size:11px;color:var(--text-faint);border:1px solid var(--border);border-radius:var(--radius-full);padding:2px 8px;}
  .proj-actions{display:flex;flex-direction:column;gap:6px;flex-shrink:0;}
  .proj-order{display:flex;gap:4px;}
  .badge-featured{display:inline-block;font-size:10.5px;color:var(--on-primary);background:var(--primary);border-radius:var(--radius-full);padding:2px 8px;margin-left:8px;}

  /* ---- modal / form ---- */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(5,7,10,0.65);display:none;align-items:flex-start;justify-content:center;
    padding:40px 16px;overflow-y:auto;z-index:100;
  }
  .modal-overlay.is-open{display:flex;}
  .modal{
    background:var(--bg-alt);border:1px solid var(--border-strong);border-radius:var(--radius-xl);
    max-width:640px;width:100%;padding:32px;box-shadow:var(--shadow-overlay);
  }
  .modal h3{font-size:19px;font-weight:var(--font-weight-semibold);margin-bottom:24px;}
  .f-row{margin-bottom:18px;}
  .f-row label{display:block;font-size:12.5px;color:var(--text-dim);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em;}
  .f-two{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  input[type="text"], input[type="number"], input[type="url"], textarea, select{
    width:100%;background:var(--surface);border:1px solid var(--border-strong);border-radius:var(--radius-md);
    padding:10px 12px;color:var(--text);font-family:inherit;font-size:14px;
  }
  textarea{min-height:80px;resize:vertical;}
  input:focus, textarea:focus, select:focus{outline:none;border-color:var(--primary);}
  .f-check{display:flex;align-items:center;gap:8px;}
  .f-check label{margin:0;text-transform:none;font-size:14px;color:var(--text);}
  .lang-tabs{display:flex;gap:8px;margin-bottom:10px;}
  .lang-tab{
    padding:5px 12px;border-radius:var(--radius-full);border:1px solid var(--border-strong);
    font-size:12px;cursor:pointer;color:var(--text-dim);
  }
  .lang-tab.active{background:var(--primary);border-color:var(--primary);color:var(--on-primary);}
  .lang-pane{display:none;}
  .lang-pane.active{display:block;}

  .img-list{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px;}
  .img-item{position:relative;width:88px;height:66px;}
  .img-item img{width:100%;height:100%;object-fit:cover;border-radius:var(--radius-sm);}
  .img-item button.img-remove{
    position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;
    background:var(--danger);color:#fff;border:none;font-size:12px;cursor:pointer;line-height:1;
  }
  .img-item .img-move{
    position:absolute;bottom:-6px;width:18px;height:18px;border-radius:50%;
    background:var(--primary,#5b5bd6);color:#fff;border:none;font-size:11px;cursor:pointer;line-height:1;
    display:flex;align-items:center;justify-content:center;padding:0;
  }
  .img-item .img-move[disabled]{opacity:.25;cursor:default;}
  .img-item .img-move-left{left:-6px;}
  .img-item .img-move-right{right:-6px;}
  .img-item .img-cover-badge{
    position:absolute;top:-6px;left:-6px;background:var(--primary,#5b5bd6);color:#fff;
    font-size:9px;line-height:1;padding:2px 4px;border-radius:3px;font-weight:600;
  }
  .img-drop{
    border:1px dashed var(--border-strong);border-radius:var(--radius-md);padding:16px;text-align:center;
    color:var(--text-dim);font-size:13px;cursor:pointer;
  }
  .img-drop:hover{border-color:var(--primary);}
  .img-drop input{display:none;}

  .link-row{display:grid;grid-template-columns:130px 1fr auto;gap:8px;margin-bottom:8px;align-items:center;}
  .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:24px;}
  .err-msg{color:var(--danger);font-size:13px;margin-top:10px;}
  .hint{color:var(--text-faint);font-size:12px;margin-top:4px;}
</style>
</head>
<body>

<div id="gateSignedOut" class="gate wrap" style="display:none;">
  <h1>Portfolio Admin</h1>
  <p>Sign in with the portfolio owner's Google account to manage projects.</p>
  <button class="btn btn-primary" id="signInBtn">Sign in with Google</button>
</div>

<div id="gateNotAuthorized" class="gate wrap" style="display:none;">
  <h1>Not authorized</h1>
  <p>This Google account doesn't have access to this admin panel.</p>
  <p class="mono" id="notAuthEmail"></p>
  <button class="btn" id="signOutBtnGate">Sign out</button>
</div>

<div id="adminApp" class="wrap" style="display:none;">
  <div class="topbar">
    <div class="brand">Portfolio <span>Admin</span></div>
    <div class="who">
      <img id="whoAvatar" src="" alt="">
      <span class="who-name" id="whoName"></span>
      <button class="btn btn-sm" id="signOutBtn">Sign out</button>
    </div>
  </div>

  <div id="importHint" class="empty-hint" style="display:none;">
    <p style="margin-bottom:12px;">No projects yet in the database.</p>
    <button class="btn btn-primary" id="importDefaultsBtn">Import the 6 existing portfolio projects</button>
  </div>

  <div class="list-head">
    <h2>Projects</h2>
    <button class="btn btn-primary" id="addProjectBtn">+ Add project</button>
  </div>

  <div id="projectList"></div>
</div>

<!-- ===================== Project form modal ===================== -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle">Add project</h3>
    <form id="projectForm">
      <div class="f-row f-two">
        <div>
          <label>Order (lower = earlier)</label>
          <input type="number" id="fOrder" value="0">
        </div>
        <div class="f-check" style="margin-top:26px;">
          <input type="checkbox" id="fFeatured">
          <label for="fFeatured">Featured (large card, only one recommended)</label>
        </div>
      </div>

      <div class="f-row">
        <div class="lang-tabs">
          <span class="lang-tab active" data-lang="en">English</span>
          <span class="lang-tab" data-lang="vi">Tiếng Việt</span>
        </div>
        <div class="lang-pane active" data-lang="en">
          <label>Title (EN)</label>
          <input type="text" id="fTitleEn" maxlength="100">
          <label style="margin-top:12px;">Description (EN)</label>
          <textarea id="fDescEn"></textarea>
        </div>
        <div class="lang-pane" data-lang="vi">
          <label>Title (VI)</label>
          <input type="text" id="fTitleVi" maxlength="100">
          <label style="margin-top:12px;">Description (VI)</label>
          <textarea id="fDescVi"></textarea>
        </div>
      </div>

      <div class="f-row">
        <label>Tags (comma separated)</label>
        <input type="text" id="fTags" placeholder="UI Design, Design System, Mobile App">
      </div>

      <div class="f-row">
        <label>Fallback link (used if no images — e.g. App Store / website URL)</label>
        <input type="url" id="fHref" placeholder="https://...">
      </div>

      <div class="f-row">
        <label>Images</label>
        <div class="img-list" id="imgList"></div>
        <label class="img-drop" id="imgDrop">
          Click to upload images (uploads to Cloudinary)
          <input type="file" id="imgInput" accept="image/*" multiple>
        </label>
        <div class="hint" id="uploadStatus"></div>
      </div>

      <div class="f-row">
        <label>Links</label>
        <div id="linkRows"></div>
        <button type="button" class="btn btn-sm" id="addLinkBtn">+ Add link</button>
      </div>

      <div class="err-msg" id="formErr"></div>
      <div class="modal-actions">
        <button type="button" class="btn" id="cancelFormBtn">Cancel</button>
        <button type="submit" class="btn btn-primary" id="saveFormBtn">Save</button>
      </div>
    </form>
  </div>
</div>

<script type="module">
import {
  db, auth, googleProvider, ADMIN_EMAIL, uploadToCloudinary
} from './firebase-init.js';
import {
  signInWithPopup, signOut, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
import {
  collection, doc, addDoc, updateDoc, deleteDoc, getDocs, query, orderBy, serverTimestamp, onSnapshot
} from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

const LINK_TYPES = ['website', 'appstore', 'demo', 'design-system'];

const gateSignedOut = document.getElementById('gateSignedOut');
const gateNotAuthorized = document.getElementById('gateNotAuthorized');
const adminApp = document.getElementById('adminApp');
const notAuthEmail = document.getElementById('notAuthEmail');
const whoAvatar = document.getElementById('whoAvatar');
const whoName = document.getElementById('whoName');
const projectList = document.getElementById('projectList');
const importHint = document.getElementById('importHint');

document.getElementById('signInBtn').addEventListener('click', () => {
  signInWithPopup(auth, googleProvider).catch(e => alert('Sign-in failed: ' + e.message));
});
document.getElementById('signOutBtn').addEventListener('click', () => signOut(auth));
document.getElementById('signOutBtnGate').addEventListener('click', () => signOut(auth));

let projectsCache = [];
let unsubscribeProjects = null;

onAuthStateChanged(auth, (user) => {
  gateSignedOut.style.display = 'none';
  gateNotAuthorized.style.display = 'none';
  adminApp.style.display = 'none';

  if (!user) {
    gateSignedOut.style.display = 'flex';
    if (unsubscribeProjects) { unsubscribeProjects(); unsubscribeProjects = null; }
    return;
  }
  if (user.email !== ADMIN_EMAIL) {
    gateNotAuthorized.style.display = 'flex';
    notAuthEmail.textContent = user.email;
    return;
  }
  adminApp.style.display = 'block';
  whoAvatar.src = user.photoURL || '';
  whoName.textContent = user.displayName || user.email;
  listenProjects();
});

function listenProjects(){
  const q = query(collection(db, 'projects'), orderBy('order', 'asc'));
  unsubscribeProjects = onSnapshot(q, (snap) => {
    projectsCache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderList();
  });
}

function renderList(){
  importHint.style.display = projectsCache.length === 0 ? 'block' : 'none';
  projectList.innerHTML = projectsCache.map(p => {
    const thumb = (p.images && p.images[0])
      ? `<img class="proj-thumb" src="${escAttr(p.images[0])}" alt="">`
      : `<div class="proj-thumb-empty">No image</div>`;
    const tags = (p.tags || []).map(t => `<span>${escHtml(t)}</span>`).join('');
    return `
      <div class="proj-card" data-id="${p.id}">
        ${thumb}
        <div class="proj-info">
          <div class="proj-title">${escHtml(p.title?.en || '(untitled)')}${p.featured ? '<span class="badge-featured">Featured</span>' : ''}</div>
          <div class="proj-sub">order ${p.order ?? 0} · ${escHtml(p.title?.vi || '')}</div>
          <div class="proj-tags">${tags}</div>
        </div>
        <div class="proj-actions">
          <button class="btn btn-sm edit-btn">Edit</button>
          <button class="btn btn-sm btn-danger del-btn">Delete</button>
        </div>
      </div>`;
  }).join('');

  projectList.querySelectorAll('.edit-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const id = e.target.closest('.proj-card').dataset.id;
      openForm(projectsCache.find(p => p.id === id));
    });
  });
  projectList.querySelectorAll('.del-btn').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      const id = e.target.closest('.proj-card').dataset.id;
      const p = projectsCache.find(x => x.id === id);
      if (confirm(`Delete "${p?.title?.en || id}"? This cannot be undone.`)) {
        await deleteDoc(doc(db, 'projects', id));
      }
    });
  });
}

document.getElementById('importDefaultsBtn').addEventListener('click', async () => {
  if (!confirm('Import the 6 existing portfolio projects into the database?')) return;
  const btn = document.getElementById('importDefaultsBtn');
  btn.disabled = true;
  btn.textContent = 'Importing…';
  for (const p of DEFAULT_PROJECTS) {
    await addDoc(collection(db, 'projects'), { ...p, createdAt: serverTimestamp(), updatedAt: serverTimestamp() });
  }
  btn.textContent = 'Done';
});

// ===================== form modal =====================
const modalOverlay = document.getElementById('modalOverlay');
const modalTitle = document.getElementById('modalTitle');
const projectForm = document.getElementById('projectForm');
const formErr = document.getElementById('formErr');
let editingId = null;
let formImages = [];
let formLinks = [];

document.getElementById('addProjectBtn').addEventListener('click', () => openForm(null));
document.getElementById('cancelFormBtn').addEventListener('click', closeForm);
modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) closeForm(); });

document.querySelectorAll('.lang-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.lang-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.lang-pane').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.querySelector(`.lang-pane[data-lang="${tab.dataset.lang}"]`).classList.add('active');
  });
});

function openForm(project){
  editingId = project ? project.id : null;
  modalTitle.textContent = project ? 'Edit project' : 'Add project';
  document.getElementById('fOrder').value = project?.order ?? (projectsCache.length);
  document.getElementById('fFeatured').checked = !!project?.featured;
  document.getElementById('fTitleEn').value = project?.title?.en || '';
  document.getElementById('fTitleVi').value = project?.title?.vi || '';
  document.getElementById('fDescEn').value = project?.desc?.en || '';
  document.getElementById('fDescVi').value = project?.desc?.vi || '';
  document.getElementById('fTags').value = (project?.tags || []).join(', ');
  document.getElementById('fHref').value = project?.href || '';
  formImages = [...(project?.images || [])];
  formLinks = [...(project?.links || [])];
  renderImgList();
  renderLinkRows();
  formErr.textContent = '';
  document.getElementById('uploadStatus').textContent = '';
  modalOverlay.classList.add('is-open');
}
function closeForm(){
  modalOverlay.classList.remove('is-open');
}

function renderImgList(){
  const imgList = document.getElementById('imgList');
  // Ảnh đầu tiên trong mảng luôn là ảnh cover/thumbnail hiển thị ở trang chủ,
  // nên thêm nút "◁ ▷" để đổi vị trí ảnh (kéo-thả không có sẵn trong UI này)
  // và một nhãn "Cover" trên ảnh đầu để người dùng biết ảnh nào đang là cover.
  imgList.innerHTML = formImages.map((src, i) => `
    <div class="img-item" data-i="${i}">
      ${i === 0 ? '<span class="img-cover-badge">Cover</span>' : ''}
      <img src="${escAttr(src)}" alt="">
      <button type="button" class="img-remove" title="Remove">×</button>
      <button type="button" class="img-move img-move-left" title="Move left" ${i === 0 ? 'disabled' : ''}>◁</button>
      <button type="button" class="img-move img-move-right" title="Move right" ${i === formImages.length - 1 ? 'disabled' : ''}>▷</button>
    </div>`).join('');
  imgList.querySelectorAll('.img-item .img-remove').forEach(btn => {
    btn.addEventListener('click', () => {
      const i = parseInt(btn.closest('.img-item').dataset.i, 10);
      formImages.splice(i, 1);
      renderImgList();
    });
  });
  imgList.querySelectorAll('.img-item .img-move-left').forEach(btn => {
    btn.addEventListener('click', () => {
      const i = parseInt(btn.closest('.img-item').dataset.i, 10);
      if (i > 0) {
        [formImages[i - 1], formImages[i]] = [formImages[i], formImages[i - 1]];
        renderImgList();
      }
    });
  });
  imgList.querySelectorAll('.img-item .img-move-right').forEach(btn => {
    btn.addEventListener('click', () => {
      const i = parseInt(btn.closest('.img-item').dataset.i, 10);
      if (i < formImages.length - 1) {
        [formImages[i + 1], formImages[i]] = [formImages[i], formImages[i + 1]];
        renderImgList();
      }
    });
  });
}

document.getElementById('imgInput').addEventListener('change', async (e) => {
  const files = Array.from(e.target.files || []);
  if (files.length === 0) return;
  const status = document.getElementById('uploadStatus');
  // Track failures explicitly instead of letting the final message just say
  // "Done." regardless — a per-file catch() below lets the loop keep going
  // after one upload fails (so one bad file doesn't block the rest), but
  // without this list the failure was silently overwritten by the next
  // file's status text and never surfaced once the loop finished (exactly
  // what happened with 1.jpg on the San Xin Ha project: 8/9 uploaded, the
  // failure flashed by unnoticed, and it still ended on "Done.").
  const failed = [];
  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    status.textContent = `Uploading ${i + 1}/${files.length}: ${file.name}…`;
    try {
      const url = await uploadToCloudinary(file);
      formImages.push(url);
      renderImgList();
    } catch (err) {
      failed.push(file.name);
    }
  }
  status.textContent = failed.length === 0
    ? `Done — uploaded ${files.length}/${files.length}.`
    : `Uploaded ${files.length - failed.length}/${files.length}. Failed: ${failed.join(', ')} — please try re-adding ${failed.length === 1 ? 'it' : 'them'}.`;
  status.style.color = failed.length === 0 ? '' : '#e5484d';
  e.target.value = '';
});

function renderLinkRows(){
  const wrap = document.getElementById('linkRows');
  wrap.innerHTML = formLinks.map((l, i) => `
    <div class="link-row" data-i="${i}">
      <select class="link-type">
        ${LINK_TYPES.map(t => `<option value="${t}" ${t === l.type ? 'selected' : ''}>${t}</option>`).join('')}
      </select>
      <input type="url" class="link-url" value="${escAttr(l.url || '')}" placeholder="https://...">
      <button type="button" class="btn btn-sm btn-danger">×</button>
    </div>`).join('');
  wrap.querySelectorAll('.link-row').forEach(row => {
    const i = parseInt(row.dataset.i, 10);
    row.querySelector('.link-type').addEventListener('change', (e) => formLinks[i].type = e.target.value);
    row.querySelector('.link-url').addEventListener('input', (e) => formLinks[i].url = e.target.value);
    row.querySelector('button').addEventListener('click', () => { formLinks.splice(i, 1); renderLinkRows(); });
  });
}
document.getElementById('addLinkBtn').addEventListener('click', () => {
  formLinks.push({ type: 'website', url: '' });
  renderLinkRows();
});

projectForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const titleEn = document.getElementById('fTitleEn').value.trim();
  if (!titleEn) { formErr.textContent = 'English title is required.'; return; }

  const data = {
    order: parseInt(document.getElementById('fOrder').value, 10) || 0,
    featured: document.getElementById('fFeatured').checked,
    title: { en: titleEn, vi: document.getElementById('fTitleVi').value.trim() || titleEn },
    desc: { en: document.getElementById('fDescEn').value.trim(), vi: document.getElementById('fDescVi').value.trim() },
    tags: document.getElementById('fTags').value.split(',').map(s => s.trim()).filter(Boolean),
    href: document.getElementById('fHref').value.trim(),
    images: formImages,
    links: formLinks.filter(l => l.url),
    updatedAt: serverTimestamp()
  };

  try {
    if (editingId) {
      await updateDoc(doc(db, 'projects', editingId), data);
    } else {
      data.createdAt = serverTimestamp();
      await addDoc(collection(db, 'projects'), data);
    }
    closeForm();
  } catch (err) {
